<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago con Binance - MEDINA-NET</title>

<style>
html{
    scroll-behavior:smooth;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow-x:hidden;
    background:
        radial-gradient(circle at top left, rgba(240,185,11,0.48), transparent 32%),
        radial-gradient(circle at bottom right, rgba(248,211,58,0.38), transparent 35%),
        linear-gradient(135deg,#111827,#181a20,#2b2f36);
}

body::before{
    content:"";
    position:fixed;
    width:480px;
    height:480px;
    border-radius:50%;
    top:-210px;
    right:-150px;
    background:rgba(240,185,11,0.13);
    z-index:0;
}

body::after{
    content:"";
    position:fixed;
    width:340px;
    height:340px;
    border-radius:50%;
    bottom:-150px;
    left:-120px;
    background:rgba(255,255,255,0.07);
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    width:100%;
    max-width:480px;
    padding:34px 26px;
    text-align:center;
    border-radius:32px;
    background:linear-gradient(180deg,#ffffff,#fff9db);
    box-shadow:0 30px 75px rgba(0,0,0,0.42);
    border:1px solid rgba(240,185,11,0.45);
    animation:entrada 0.85s ease;
}

.logo{
    width:95px;
    height:95px;
    margin:0 auto 16px;
    border-radius:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:44px;
    color:#111827;
    background:linear-gradient(135deg,#f0b90b,#f8d33a);
    box-shadow:0 16px 32px rgba(240,185,11,0.45);
}

.empresa{
    margin:0;
    color:#b88700;
    font-size:14px;
    letter-spacing:2px;
    font-weight:900;
    text-transform:uppercase;
}

h1{
    margin:8px 0 0;
    color:#111827;
    font-size:32px;
    font-weight:900;
}

.subtitulo{
    margin-top:8px;
    color:#5f6472;
    font-size:15px;
    line-height:1.5;
}

.numero{
    margin:22px auto 14px;
    padding:15px 22px;
    width:fit-content;
    border-radius:45px;
    font-size:25px;
    font-weight:900;
    color:#111827;
    background:#fff4bf;
    border:2px dashed #f0b90b;
    letter-spacing:1px;
}

.soporte{
    margin:0 auto 22px;
    padding:11px 18px;
    width:fit-content;
    border-radius:40px;
    color:#111827;
    font-size:15px;
    font-weight:900;
    background:linear-gradient(135deg,#f0b90b,#f8d33a);
    box-shadow:0 12px 25px rgba(240,185,11,0.38);
    animation:brillo 2.2s infinite;
}

.qr-box{
    margin-top:20px;
    padding:20px;
    border-radius:26px;
    background:linear-gradient(180deg,#ffffff,#fff4bf);
    border:1px solid #f8d33a;
}

.qr-box h3{
    margin:0 0 14px;
    color:#111827;
    font-size:20px;
}

.qr-box img{
    width:225px;
    max-width:100%;
    padding:10px;
    background:white;
    border-radius:22px;
    box-shadow:0 14px 30px rgba(0,0,0,0.25);
    animation:pulso 2.6s infinite;
}

.aviso{
    margin-top:16px;
    padding:14px 16px;
    border-radius:20px;
    color:#111827;
    background:#fff8db;
    border:1px solid #f8d33a;
    font-size:14px;
    line-height:1.5;
}

.btn{
    display:block;
    width:100%;
    margin-top:20px;
    padding:15px 20px;
    border-radius:40px;
    color:white;
    text-decoration:none;
    font-size:15px;
    font-weight:900;
    background:linear-gradient(135deg,#25d366,#128c7e);
    box-shadow:0 12px 25px rgba(37,211,102,0.35);
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);
}

.volver{
    display:inline-block;
    margin-top:20px;
    color:#b88700;
    text-decoration:none;
    font-size:15px;
    font-weight:900;
}

.volver:hover{
    text-decoration:underline;
}

.footer{
    margin-top:20px;
    padding-top:15px;
    border-top:1px solid #f8d33a;
    color:#6b7280;
    font-size:14px;
}

.footer strong{
    color:#111827;
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(35px) scale(0.96);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes pulso{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.04); }
    100%{ transform:scale(1); }
}

@keyframes brillo{
    0%{
        transform:scale(1);
        box-shadow:0 12px 25px rgba(240,185,11,0.38);
    }
    50%{
        transform:scale(1.04);
        box-shadow:0 15px 32px rgba(240,185,11,0.58);
    }
    100%{
        transform:scale(1);
        box-shadow:0 12px 25px rgba(240,185,11,0.38);
    }
}

@media(max-width:768px){
    body{
        align-items:flex-start;
        padding:24px 16px;
    }

    .container{
        max-width:470px;
        padding:32px 24px;
    }
}

@media(max-width:480px){
    body{
        align-items:flex-start;
        padding:18px 12px;
    }

    .container{
        padding:28px 18px;
        border-radius:26px;
    }

    .logo{
        width:80px;
        height:80px;
        font-size:36px;
        border-radius:24px;
    }

    h1{
        font-size:27px;
    }

    .subtitulo{
        font-size:14px;
    }

    .numero{
        font-size:20px;
        padding:13px 18px;
    }

    .soporte{
        font-size:14px;
        padding:10px 15px;
    }

    .qr-box img{
        width:205px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">💛</div>

    <p class="empresa">MEDINA-NET</p>

    <h1>Pago con Binance</h1>

    <div class="subtitulo">
        Realiza tu pago de forma rápida, moderna y segura.
    </div>

    <div class="numero">🪙 Binance</div>

    <div class="qr-box">
        <h3>Escanea el código QR</h3>
        <img src="qr.png" alt="Código QR Binance">
    </div>

    <div class="aviso">
        Luego de realizar tu pago por <strong>Binance</strong>, envía tu comprobante para validar la operación.
    </div>

    <a class="btn" href="https://wa.me/51935128270?text=Hola,%20ya%20realicé%20mi%20pago%20por%20Binance.%20Adjunto%20mi%20comprobante." target="_blank">
        📲 Enviar comprobante por WhatsApp
    </a>

    <a class="volver" href="../index.html">⬅ Volver al inicio</a>

    <div class="footer">
        Gracias por tu preferencia 🙌<br>
        <strong>MEDINA-NET</strong>
    </div>

</div>

</body>
</html>
